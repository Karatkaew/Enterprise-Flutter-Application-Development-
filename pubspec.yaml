name: myapp
description: AI Receipt Expense Tracker
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.7.0

  # Networking
  dio: ^5.4.3+1
  http: ^1.2.0
  dartz: ^0.10.1

  # Routing
  auto_route: ^11.1.0

  # JSON
  json_annotation: ^4.9.0

  # Local Database (Offline First)
  drift: ^2.32.0
  sqlite3_flutter_libs: ^0.6.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Key Value Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0


  # AI / ML
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.0.7

  # Charts
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.13

  json_serializable: ^6.8.0
  auto_route_generator: ^10.5.0
  drift_dev: ^2.32.0

  mocktail: ^1.0.3

  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true